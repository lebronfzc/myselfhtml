<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FZC Personal Home</title>
  <meta
    name="description"
    content="FZC personal homepage and 2026 portfolio."
  />
  <style>
    @font-face {
      font-family: "Cargo ROM";
      src: url("https://type.cargo.site/files/CargoROMCondensedVariable.woff2") format("woff2-variations");
      font-weight: 300 900;
    }

    @font-face {
      font-family: "Cargo Diatype";
      src: url("https://type.cargo.site/files/CargoDiatypePlusVariable.woff2") format("woff2-variations");
      font-weight: 200 900;
    }

    :root {
      color-scheme: dark;
      --glass: rgba(140, 195, 255, 0.42);
      --line: rgba(255, 255, 255, 0.25);
      --white: rgba(255, 255, 255, 0.95);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: rgba(84, 160, 255, 0.34);
      font-family: "Cargo Diatype", "Microsoft YaHei", sans-serif;
    }

    body {
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      isolation: isolate;
      background: #061c42;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: grayscale(0.42) saturate(1.72) contrast(1.08) brightness(1.18);
      transform: scale(1.015);
    }

    .color-filter {
      position: absolute;
      inset: 0;
      background: rgba(32, 132, 255, 0.46);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 1;
    }

    .shadow-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(79, 171, 255, 0.1) 0 34%, rgba(0, 56, 135, 0.12) 68%, rgba(0, 15, 56, 0.28) 100%),
        linear-gradient(180deg, rgba(20, 99, 214, 0.1), transparent 30%, rgba(0, 42, 125, 0.16));
      pointer-events: none;
      z-index: 2;
    }

    .home-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0, 40, 120, 0.18);
      z-index: 3;
      transition: opacity 420ms ease, transform 520ms cubic-bezier(.18,.86,.22,1);
    }

    body.portal-open .home-overlay,
    body:has(.portal:target) .home-overlay {
      opacity: 0;
      transform: scale(0.98) translateY(-18px);
      pointer-events: none;
    }

    .panel {
      width: min(420px, calc(100vw - 40px));
      min-width: 0;
      padding: 1.15rem;
      text-align: center;
      color: var(--white);
      background:
        linear-gradient(145deg, rgba(149, 210, 255, 0.38), rgba(6, 47, 116, 0.78) 54%, rgba(2, 25, 72, 0.9)),
        rgba(40, 116, 210, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 22px;
      box-shadow: 0 1.4rem 4rem rgba(0, 22, 68, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(8px);
      transform: translateY(0) scale(1);
      opacity: 1;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-family: "Cargo ROM", "Microsoft YaHei", sans-serif;
      font-size: clamp(3.35rem, 4.6vw, 4.4rem);
      font-weight: 880;
      line-height: 0.82;
      font-variant: normal;
      text-transform: uppercase;
      letter-spacing: 0;
      color: #fff8ef;
      background:
        radial-gradient(circle at 12% 76%, #ffd9ad 0 16%, transparent 42%),
        radial-gradient(circle at 82% 36%, #f0d6ff 0 18%, transparent 48%),
        linear-gradient(180deg, #fffaf1 0%, #f8f4ff 42%, #f2e8fb 62%, #fff2dd 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.82),
        0 6px 0 rgba(34, 22, 44, 0.1),
        0 15px 18px rgba(9, 10, 24, 0.42),
        -0.22rem 0.42rem 1rem rgba(255, 197, 145, 0.34),
        0.32rem 0.18rem 1.15rem rgba(226, 205, 255, 0.28);
      filter: drop-shadow(0 0.34rem 0 rgba(22, 16, 32, 0.2)) drop-shadow(0 1.1rem 1.5rem rgba(0, 0, 0, 0.4));
    }

    .rule {
      height: 1px;
      margin: 1rem 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.62), transparent);
    }

    a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.08em;
      transition: opacity 160ms ease, filter 160ms ease, transform 160ms ease;
    }

    a:hover {
      opacity: 0.72;
      filter: blur(0.2px);
    }

    .portfolio-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      width: 100%;
      min-height: 5rem;
      padding: 1rem 1.05rem;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.16), transparent 42%),
        rgba(7, 44, 112, 0.44);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
      text-decoration: none;
      font-size: 1.08rem;
      font-weight: 820;
      text-align: left;
    }

    .portfolio-link span {
      display: block;
    }

    .portfolio-link [data-config="home.portfolioTitle"] {
      font-size: 1.08rem;
      font-weight: 820;
    }

    .portfolio-link [data-config="home.portfolioSubtitle"] {
      font-size: 0.88rem;
      font-weight: 620;
      opacity: 0.76;
      margin-top: 0.25rem;
    }

    .portfolio-link::after {
      content: ">";
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      font-family: "Cargo ROM", "Microsoft YaHei", sans-serif;
      font-size: 1.35rem;
      line-height: 1;
    }

    .portal {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 1.1rem;
      padding: clamp(1rem, 3vw, 2.5rem);
      color: var(--white);
      background: rgba(3, 22, 58, 0.34);
      backdrop-filter: blur(7px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(30px) scale(0.985);
      transition: opacity 420ms ease, transform 560ms cubic-bezier(.18,.86,.22,1);
      overflow: hidden;
    }

    .portal.is-open,
    .portal:target {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .portal-bar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
    }

    .portal-title {
      margin: 0;
      font-family: "Cargo ROM", "Microsoft YaHei", sans-serif;
      font-size: clamp(3.2rem, 10vw, 8.6rem);
      font-weight: 650;
      line-height: 0.82;
      text-transform: lowercase;
    }

    .portal-actions {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding-bottom: 0.28rem;
    }

    .portal-actions .upload-button {
      display: none;
    }

    .icon-button,
    .upload-button {
      min-height: 2.65rem;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 0.6rem;
      background: rgba(96, 170, 255, 0.34);
      color: var(--white);
      font: inherit;
      font-weight: 760;
      cursor: pointer;
      box-shadow: -18rem -18rem 0 -13rem rgba(0, 0, 0, 0.22) inset;
      transition: transform 180ms ease, background 180ms ease, opacity 180ms ease;
      text-decoration: none;
    }

    .icon-button:hover,
    .upload-button:hover {
      transform: translateY(-1px);
      background: rgba(148, 204, 255, 0.42);
    }

    .icon-button {
      width: 2.65rem;
      display: inline-grid;
      place-items: center;
      font-size: 1.45rem;
      line-height: 1;
    }

    .upload-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 0.9rem;
      white-space: nowrap;
    }

    .upload-button input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .works-shell {
      min-height: 0;
      overflow: auto;
      padding-right: 0.35rem;
    }

    .works-shell::-webkit-scrollbar {
      width: 8px;
    }

    .works-shell::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.32);
      border-radius: 999px;
    }

    .masonry {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 360px));
      align-items: start;
      justify-content: start;
      gap: 1.1rem;
      padding-bottom: 8rem;
    }

    .work-card {
      display: block;
      width: 100%;
      margin: 0;
      color: var(--white);
      background: rgba(105, 177, 255, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 0.65rem 0.55rem 0.9rem 2.4rem;
      overflow: hidden;
      box-shadow: -28rem -28rem 3rem -22rem rgba(1, 20, 58, 0.55) inset, 0 1rem 3rem rgba(0, 16, 45, 0.16);
      backdrop-filter: blur(3px);
      text-decoration: none;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .work-card:hover {
      transform: translateY(-4px);
      background: rgba(130, 191, 255, 0.34);
      border-color: rgba(255, 255, 255, 0.36);
    }

    .work-frame {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: 4 / 3;
      min-height: 150px;
      max-height: 240px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.18), transparent 34%),
        radial-gradient(circle at 30% 20%, rgba(255,255,255,0.28), transparent 28%),
        rgba(17, 70, 142, 0.62);
      overflow: hidden;
    }

    .work-frame video,
    .work-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .work-index {
      position: absolute;
      top: 0.7rem;
      left: 0.75rem;
      z-index: 1;
      font-family: "Cargo ROM", "Microsoft YaHei", sans-serif;
      font-size: 2rem;
      line-height: 0.8;
      opacity: 0.82;
      mix-blend-mode: plus-lighter;
    }

    .work-empty {
      width: 3.4rem;
      height: 3.4rem;
      border: 2px solid rgba(255, 255, 255, 0.62);
      border-radius: 50%;
      position: relative;
      opacity: 0.86;
    }

    .work-empty::before,
    .work-empty::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      width: 1.35rem;
      height: 2px;
      background: rgba(255, 255, 255, 0.82);
      transform: translate(-50%, -50%);
    }

    .work-empty::after {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    .work-meta {
      padding: 0.8rem 0.9rem 1rem;
    }

    .work-kicker {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.45rem;
      font-size: 0.72rem;
      font-weight: 780;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.72;
    }

    .work-meta h3 {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.1;
      font-weight: 820;
    }

    .work-meta p {
      margin: 0.38rem 0 0;
      font-size: 0.88rem;
      line-height: 1.35;
      opacity: 0.74;
    }

    .work-link-label {
      display: inline-block;
      margin-top: 0.7rem;
      font-size: 0.78rem;
      font-weight: 820;
      opacity: 0.84;
    }

    .socials {
      position: fixed;
      right: 2.9rem;
      bottom: 2.9rem;
      z-index: 4;
      text-align: right;
    }

    .social-box {
      display: inline-grid;
      gap: 0.28rem;
      padding: 0.6rem 1.2rem;
      border: 0.1rem solid rgba(255, 255, 255, 0.25);
      border-radius: 0.6rem;
      background: rgba(5, 38, 92, 0.78);
      color: transparent;
      line-height: 2;
      box-shadow: -22rem -22rem 0 -16rem rgba(0, 0, 0, 0.25);
    }

    .icon {
      width: 1rem;
      height: 1rem;
      display: block;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.85);
      position: relative;
    }

    .icon.sound::after {
      content: "";
      position: absolute;
      width: 0.42rem;
      height: 0.42rem;
      border: 2px solid rgba(255, 255, 255, 0.85);
      border-left: 0;
      border-bottom: 0;
      border-radius: 50%;
      right: -0.35rem;
      top: 0.05rem;
    }

    .cursor-glow {
      position: fixed;
      width: 220px;
      height: 220px;
      margin: -110px 0 0 -110px;
      pointer-events: none;
      z-index: 2;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 62%);
      mix-blend-mode: plus-lighter;
      opacity: 0;
      transition: opacity 200ms ease;
    }

    @media (max-width: 760px) {
      .panel {
        width: min(330px, calc(100vw - 32px));
        padding: 1rem;
      }

      h1 {
        font-size: 3rem;
      }

      .right {
        padding-left: 0.45rem;
        padding-right: 0;
      }

      .socials {
        right: 1rem;
        bottom: 1rem;
      }

      .portal {
        padding: 1rem;
      }

      .portal-bar {
        align-items: start;
      }

      .portal-title {
        font-size: clamp(3rem, 18vw, 5.5rem);
      }

      .portal-actions {
        flex-direction: column-reverse;
        align-items: end;
      }

      .upload-button {
        width: 7.4rem;
        padding-inline: 0.45rem;
        font-size: 0.88rem;
      }

      .masonry {
        grid-template-columns: 1fr;
      }

      .work-frame {
        min-height: 150px;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <canvas id="ripple"></canvas>
    <div class="color-filter"></div>
    <div class="shadow-vignette"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <section class="home-overlay" aria-label="FZC personal home">
      <div class="panel">
        <h1 data-config="home.name">FZC</h1>
        <div class="rule"></div>
        <a class="portfolio-link" href="#videosPortal" data-open="videos">
          <span data-config="home.portfolioTitle">2026 年作品集</span>
          <span data-config="home.portfolioSubtitle">点击展开梦境视频</span>
        </a>
      </div>
    </section>

    <nav class="socials" aria-label="social links">
      <div class="social-box">
        <a href="#" aria-label="spotify"><span class="icon"></span></a>
        <a href="#" aria-label="soundcloud"><span class="icon sound"></span></a>
      </div>
    </nav>

    <section class="portal" id="videosPortal" aria-label="video works">
      <div class="portal-bar">
        <h2 class="portal-title">2026</h2>
        <div class="portal-actions">
          <label class="upload-button">
            <span data-config="labels.uploadButton">上传梦境视频</span>
            <input id="videoUpload" type="file" accept="video/mp4,video/webm,video/quicktime,video/x-m4v">
          </label>
          <a class="icon-button" href="#" data-close aria-label="返回">×</a>
        </div>
      </div>
      <div class="works-shell">
        <div class="masonry" id="worksGrid" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("ripple");
    const ctx = canvas.getContext("2d", { alpha: false });
    const glow = document.getElementById("cursorGlow");
    const portals = {
      videos: document.getElementById("videosPortal")
    };
    const videoUpload = document.getElementById("videoUpload");
    const worksGrid = document.getElementById("worksGrid");
    let siteConfig = {
      site: {
        title: "FZC Personal Home",
        description: "FZC personal homepage and 2026 portfolio."
      },
      home: {
        name: "FZC",
        portfolioTitle: "2026 年作品集",
        portfolioSubtitle: "点击展开梦境视频",
        backgroundImage: "https://freight.cargo.site/original/i/D3007205125060386413698112470986/8a9f72eb-313c-4f4e-b6df-657d2efac876-1.png"
      },
      video: {
        title: "梦境视频",
        note: "等待上传",
        publishedNote: "已发布",
        localPreviewNote: "本地预览",
        src: "assets/videos/dream-video.mov"
      },
      works: [
        {
          title: "梦境视频",
          year: "2026",
          type: "Video",
          description: "等待上传第一支代表作品。",
          media: "",
          link: ""
        },
        {
          title: "AIGC 视觉实验",
          year: "2026",
          type: "AIGC",
          description: "用于展示生成式视觉、动态影像或品牌实验。",
          media: "",
          link: ""
        }
      ],
      labels: {
        uploadButton: "上传梦境视频",
        back: "返回"
      }
    };
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = siteConfig.home.backgroundImage;

    const pointer = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5, active: false };
    let w = 0;
    let h = 0;
    let dpr = 1;
    let start = performance.now();

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = Math.floor(innerWidth * dpr);
      h = Math.floor(innerHeight * dpr);
      canvas.width = w;
      canvas.height = h;
    }

    function coverSize(iw, ih) {
      const scale = Math.max(w / iw, h / ih);
      const nw = iw * scale;
      const nh = ih * scale;
      return { x: (w - nw) / 2, y: (h - nh) / 2, w: nw, h: nh };
    }

    function draw(time) {
      const t = (time - start) / 1000;
      pointer.x += (pointer.tx - pointer.x) * 0.045;
      pointer.y += (pointer.ty - pointer.y) * 0.045;

      ctx.fillStyle = "#061c42";
      ctx.fillRect(0, 0, w, h);

      if (img.complete && img.naturalWidth) {
        const size = coverSize(img.naturalWidth, img.naturalHeight);
        const bands = 92;
        const sliceH = Math.ceil(size.h / bands);
        const intensity = pointer.active ? 24 * dpr : 14 * dpr;

        for (let i = 0; i < bands; i++) {
          const sy = i * img.naturalHeight / bands;
          const sh = img.naturalHeight / bands + 1;
          const dy = size.y + i * sliceH;
          const phase = i * 0.38 + t * 2.3;
          const mouseWave = Math.sin((i / bands - pointer.y) * 10.0) * Math.exp(-Math.abs(i / bands - pointer.y) * 4.3);
          const dx = size.x + Math.sin(phase) * 8 * dpr + mouseWave * intensity + Math.sin(t * 0.7 + i * 0.07) * 5 * dpr;
          ctx.drawImage(img, 0, sy, img.naturalWidth, sh, dx, dy, size.w, sliceH + 2);
        }
      }

      ctx.globalCompositeOperation = "lighter";
      const gx = pointer.x * w;
      const gy = pointer.y * h;
      const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.min(w, h) * 0.26);
      grad.addColorStop(0, "rgba(255,255,255,0.12)");
      grad.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = "source-over";

      requestAnimationFrame(draw);
    }

    addEventListener("resize", resize);
    addEventListener("pointermove", (event) => {
      pointer.tx = event.clientX / innerWidth;
      pointer.ty = event.clientY / innerHeight;
      pointer.active = true;
      glow.style.opacity = "1";
      glow.style.transform = `translate(${event.clientX}px, ${event.clientY}px)`;
    });
    addEventListener("pointerleave", () => {
      pointer.active = false;
      glow.style.opacity = "0";
    });

    document.querySelectorAll("[data-open]").forEach((link) => {
      link.addEventListener("click", (event) => {
        const target = portals[link.dataset.open];
        if (!target) return;
        document.body.classList.add("portal-open");
        Object.values(portals).forEach((portal) => portal.classList.remove("is-open"));
        target.classList.add("is-open");
      });
    });

    document.querySelectorAll("[data-close]").forEach((button) => {
      button.addEventListener("click", () => {
        document.body.classList.remove("portal-open");
        Object.values(portals).forEach((portal) => portal.classList.remove("is-open"));
      });
    });

    addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        document.body.classList.remove("portal-open");
        Object.values(portals).forEach((portal) => portal.classList.remove("is-open"));
      }
    });

    function isVideoMedia(src) {
      return /\.(mp4|webm|mov|m4v)(\?.*)?$/i.test(src);
    }

    function padIndex(index) {
      return String(index + 1).padStart(2, "0");
    }

    function createMedia(work, index) {
      const frame = document.createElement("div");
      frame.className = "work-frame";

      const number = document.createElement("span");
      number.className = "work-index";
      number.textContent = padIndex(index);
      frame.append(number);

      if (work.media) {
        if (isVideoMedia(work.media)) {
          const video = document.createElement("video");
          video.src = work.media;
          video.controls = true;
          video.playsInline = true;
          video.preload = "metadata";
          frame.append(video);
        } else {
          const image = document.createElement("img");
          image.src = work.media;
          image.alt = work.title || "作品封面";
          frame.append(image);
        }
      } else {
        const empty = document.createElement("span");
        empty.className = "work-empty";
        frame.append(empty);
      }

      return frame;
    }

    function renderWorks(works) {
      const list = Array.isArray(works) && works.length ? works : siteConfig.works;
      worksGrid.replaceChildren();

      list.forEach((work, index) => {
        const card = document.createElement(work.link ? "a" : "article");
        card.className = "work-card";
        if (work.link) {
          card.href = work.link;
          card.target = "_blank";
          card.rel = "noreferrer";
        }

        const meta = document.createElement("div");
        meta.className = "work-meta";

        const kicker = document.createElement("div");
        kicker.className = "work-kicker";
        kicker.textContent = `${work.year || "2026"} / ${work.type || "Work"}`;

        const title = document.createElement("h3");
        title.textContent = work.title || "未命名作品";

        const description = document.createElement("p");
        description.textContent = work.description || "这里可以放置作品说明。";

        meta.append(kicker, title, description);
        if (work.link) {
          const linkLabel = document.createElement("span");
          linkLabel.className = "work-link-label";
          linkLabel.textContent = "查看作品";
          meta.append(linkLabel);
        }

        card.append(createMedia(work, index), meta);
        worksGrid.append(card);
      });
    }

    function getByPath(target, path) {
      return path.split(".").reduce((value, part) => value && value[part], target);
    }

    function mergeConfig(base, next) {
      return {
        site: { ...base.site, ...(next.site || {}) },
        home: { ...base.home, ...(next.home || {}) },
        video: { ...base.video, ...(next.video || {}) },
        works: Array.isArray(next.works) ? next.works : base.works,
        labels: { ...base.labels, ...(next.labels || {}) }
      };
    }

    function applyConfig(config) {
      siteConfig = mergeConfig(siteConfig, config || {});
      document.title = siteConfig.site.title;
      const description = document.querySelector('meta[name="description"]');
      if (description) description.content = siteConfig.site.description;
      document.querySelectorAll("[data-config]").forEach((element) => {
        const value = getByPath(siteConfig, element.dataset.config);
        if (typeof value === "string") element.textContent = value;
      });
      img.src = siteConfig.home.backgroundImage;
      renderWorks(siteConfig.works);
    }

    fetch("/api/site")
      .then((response) => response.ok ? response.json() : null)
      .then((config) => applyConfig(config))
      .catch(() => {
        applyConfig(siteConfig);
      });

    videoUpload.addEventListener("change", () => {
      const file = videoUpload.files && videoUpload.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      renderWorks([
        {
          title: file.name.replace(/\.[^.]+$/, ""),
          year: "Preview",
          type: "Video",
          description: siteConfig.video.localPreviewNote,
          media: url,
          link: ""
        },
        ...siteConfig.works
      ]);
    });

    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
