<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FZC Personal Home</title>
  <style>
    @font-face {
      font-family: "Cargo ROM";
      src: url("https://type.cargo.site/files/CargoROMCondensedVariable.woff2") format("woff2-variations");
      font-weight: 300 900;
    }

    @font-face {
      font-family: "Cargo Diatype";
      src: url("https://type.cargo.site/files/CargoDiatypePlusVariable.woff2") format("woff2-variations");
      font-weight: 200 900;
    }

    :root {
      color-scheme: dark;
      --glass: rgba(140, 195, 255, 0.42);
      --line: rgba(255, 255, 255, 0.25);
      --white: rgba(255, 255, 255, 0.95);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: rgba(84, 160, 255, 0.34);
      font-family: "Cargo Diatype", "Microsoft YaHei", sans-serif;
    }

    body {
      opacity: 0;
      animation: pageIn 900ms ease forwards;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      isolation: isolate;
      background: #061c42;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: grayscale(0.42) saturate(1.72) contrast(1.08) brightness(1.18);
      transform: scale(1.015);
    }

    .color-filter {
      position: absolute;
      inset: 0;
      background: rgba(32, 132, 255, 0.46);
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 1;
    }

    .shadow-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(79, 171, 255, 0.1) 0 34%, rgba(0, 56, 135, 0.12) 68%, rgba(0, 15, 56, 0.28) 100%),
        linear-gradient(180deg, rgba(20, 99, 214, 0.1), transparent 30%, rgba(0, 42, 125, 0.16));
      pointer-events: none;
      z-index: 2;
    }

    .home-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0, 40, 120, 0.18);
      mix-blend-mode: plus-lighter;
      z-index: 3;
    }

    .panel {
      width: min(25vw, 370px);
      min-width: 300px;
      padding: 0.8rem 0.45rem 3.1rem;
      text-align: center;
      color: var(--white);
      background: var(--glass);
      border: 0 solid rgba(191, 191, 191, 0.25);
      border-radius: 0.6rem 0.5rem 1rem 6.9rem;
      box-shadow: -63rem -63rem 6.6rem -52.8rem #04327b inset, 0 0 5rem rgba(67, 157, 255, 0.16);
      backdrop-filter: blur(2px);
      transform: translateY(18px) scale(0.985);
      animation: cardIn 1050ms cubic-bezier(.18,.86,.22,1) 160ms forwards;
      opacity: 0;
    }

    h1 {
      margin: 0;
      font-family: "Cargo ROM", "Microsoft YaHei", sans-serif;
      font-size: clamp(3.1rem, 4vw, 3.85rem);
      font-weight: 650;
      line-height: 0.95;
      font-variant: small-caps;
      text-transform: lowercase;
      letter-spacing: 0;
    }

    .rule {
      height: 7px;
      margin: 0.9rem 0;
      background: var(--line);
    }

    .row {
      display: grid;
      grid-template-columns: 7fr 5fr;
      align-items: start;
      gap: 0;
      font-size: 1.2rem;
      font-weight: 760;
      line-height: 1.25;
    }

    .left {
      text-align: left;
      padding-left: 0.18rem;
      min-width: 0;
    }

    .right {
      text-align: right;
      padding-right: 0.1rem;
      min-width: 3rem;
    }

    a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 0.08em;
      transition: opacity 160ms ease, filter 160ms ease, transform 160ms ease;
    }

    a:hover {
      opacity: 0.72;
      filter: blur(0.2px);
    }

    .contact {
      display: block;
      margin-top: 0.25rem;
      font-size: 1.08rem;
      font-weight: 620;
      text-align: left;
      text-decoration: none;
      padding-left: 0.18rem;
    }

    .socials {
      position: fixed;
      right: 2.9rem;
      bottom: 2.9rem;
      z-index: 4;
      text-align: right;
      mix-blend-mode: plus-lighter;
    }

    .social-box {
      display: inline-grid;
      gap: 0.28rem;
      padding: 0.6rem 1.2rem;
      border: 0.1rem solid rgba(255, 255, 255, 0.25);
      border-radius: 0.6rem;
      background: rgba(5, 38, 92, 0.78);
      color: transparent;
      line-height: 2;
      box-shadow: -22rem -22rem 0 -16rem rgba(0, 0, 0, 0.25);
    }

    .icon {
      width: 1rem;
      height: 1rem;
      display: block;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.85);
      position: relative;
    }

    .icon.sound::after {
      content: "";
      position: absolute;
      width: 0.42rem;
      height: 0.42rem;
      border: 2px solid rgba(255, 255, 255, 0.85);
      border-left: 0;
      border-bottom: 0;
      border-radius: 50%;
      right: -0.35rem;
      top: 0.05rem;
    }

    .cursor-glow {
      position: fixed;
      width: 220px;
      height: 220px;
      margin: -110px 0 0 -110px;
      pointer-events: none;
      z-index: 2;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 62%);
      mix-blend-mode: plus-lighter;
      opacity: 0;
      transition: opacity 200ms ease;
    }

    @keyframes pageIn {
      to { opacity: 1; }
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 760px) {
      .panel {
        width: min(300px, calc(100vw - 32px));
        min-width: 0;
        padding-inline: 0.35rem;
      }

      .row {
        font-size: 0.86rem;
        grid-template-columns: minmax(0, 1fr) 3rem;
      }

      h1 {
        font-size: 3rem;
      }

      .right {
        padding-left: 0.45rem;
        padding-right: 0;
      }

      .socials {
        right: 1rem;
        bottom: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <canvas id="ripple"></canvas>
    <div class="color-filter"></div>
    <div class="shadow-vignette"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <section class="home-overlay" aria-label="FZC personal home">
      <div class="panel">
        <h1>FZC</h1>
        <div class="rule"></div>

        <div class="row">
          <div class="left">Mar. 15, 2024—2026<br><br>个人作品<br><br></div>
          <div class="right"><a href="#">查看</a>&nbsp;</div>
        </div>

        <div class="rule"></div>

        <div class="row">
          <div class="left">Mar. 23, 2024—2026<br>关于 FZC</div>
          <div class="right"><a href="#">查看</a>&nbsp;</div>
        </div>

        <div class="rule"></div>
        <a class="contact" href="#">联系方式</a>
      </div>
    </section>

    <nav class="socials" aria-label="social links">
      <div class="social-box">
        <a href="#" aria-label="spotify"><span class="icon"></span></a>
        <a href="#" aria-label="soundcloud"><span class="icon sound"></span></a>
      </div>
    </nav>
  </main>

  <script>
    const canvas = document.getElementById("ripple");
    const ctx = canvas.getContext("2d", { alpha: false });
    const glow = document.getElementById("cursorGlow");
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = "https://freight.cargo.site/original/i/D3007205125060386413698112470986/8a9f72eb-313c-4f4e-b6df-657d2efac876-1.png";

    const pointer = { x: 0.5, y: 0.5, tx: 0.5, ty: 0.5, active: false };
    let w = 0;
    let h = 0;
    let dpr = 1;
    let start = performance.now();

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = Math.floor(innerWidth * dpr);
      h = Math.floor(innerHeight * dpr);
      canvas.width = w;
      canvas.height = h;
    }

    function coverSize(iw, ih) {
      const scale = Math.max(w / iw, h / ih);
      const nw = iw * scale;
      const nh = ih * scale;
      return { x: (w - nw) / 2, y: (h - nh) / 2, w: nw, h: nh };
    }

    function draw(time) {
      const t = (time - start) / 1000;
      pointer.x += (pointer.tx - pointer.x) * 0.045;
      pointer.y += (pointer.ty - pointer.y) * 0.045;

      ctx.fillStyle = "#061c42";
      ctx.fillRect(0, 0, w, h);

      if (img.complete && img.naturalWidth) {
        const size = coverSize(img.naturalWidth, img.naturalHeight);
        const bands = 92;
        const sliceH = Math.ceil(size.h / bands);
        const intensity = pointer.active ? 42 * dpr : 24 * dpr;

        for (let i = 0; i < bands; i++) {
          const sy = i * img.naturalHeight / bands;
          const sh = img.naturalHeight / bands + 1;
          const dy = size.y + i * sliceH;
          const phase = i * 0.38 + t * 2.3;
          const mouseWave = Math.sin((i / bands - pointer.y) * 10.0) * Math.exp(-Math.abs(i / bands - pointer.y) * 4.3);
          const dx = size.x + Math.sin(phase) * 15 * dpr + mouseWave * intensity + Math.sin(t * 0.7 + i * 0.07) * 9 * dpr;
          ctx.drawImage(img, 0, sy, img.naturalWidth, sh, dx, dy, size.w, sliceH + 2);
        }
      }

      ctx.globalCompositeOperation = "lighter";
      const gx = pointer.x * w;
      const gy = pointer.y * h;
      const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, Math.min(w, h) * 0.26);
      grad.addColorStop(0, "rgba(255,255,255,0.12)");
      grad.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      ctx.globalCompositeOperation = "source-over";

      requestAnimationFrame(draw);
    }

    addEventListener("resize", resize);
    addEventListener("pointermove", (event) => {
      pointer.tx = event.clientX / innerWidth;
      pointer.ty = event.clientY / innerHeight;
      pointer.active = true;
      glow.style.opacity = "1";
      glow.style.transform = `translate(${event.clientX}px, ${event.clientY}px)`;
    });
    addEventListener("pointerleave", () => {
      pointer.active = false;
      glow.style.opacity = "0";
    });

    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
